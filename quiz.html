<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квиз — Блогер с нуля</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF;
  --bg-soft: #F5F6F7;
  --bg-muted: #EDEEF0;
  --ink: #1A1A1A;
  --ink-2: #4A4D52;
  --ink-3: #8A8E94;
  --line: #E4E6E9;
  --accent: #C4F542;
  --accent-h: #B8E83D;
  --acc-ink: #0F1A00;
  --correct: #C4F542;
  --wrong: #FF5A5A;
  --fd: 'Unbounded', sans-serif;
  --fb: 'Manrope', sans-serif;
  --fm: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--fb);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-font-smoothing: antialiased;
}

/* ── Canvas for confetti ── */
#confetti-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 999;
}

/* ── Shell ── */
.shell {
  width: 100%; max-width: 820px;
  padding: 32px 32px 60px;
}

/* ── Header ── */
.quiz-header { text-align: center; margin-bottom: 40px; }
.quiz-eyebrow {
  font-family: var(--fm); font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px;
}
.quiz-title {
  font-family: var(--fd); font-weight: 700;
  font-size: clamp(22px, 4vw, 34px);
  line-height: 1.1; letter-spacing: -0.02em;
  margin-bottom: 12px;
}
.quiz-title span { color: var(--acc-ink); background: var(--accent); padding: 0 6px; border-radius: 6px; }
.quiz-sub { color: var(--ink-2); font-size: 15px; line-height: 1.6; max-width: 480px; margin: 0 auto; }

/* ── Progress ── */
.progress-wrap { margin-bottom: 28px; }
.progress-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.progress-label { font-family: var(--fm); font-size: 11px; color: var(--ink-3); letter-spacing: 0.05em; }
.progress-score { font-family: var(--fm); font-size: 11px; color: var(--ink-3); }
.progress-track {
  height: 6px; background: var(--bg-muted); border-radius: 99px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 99px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}

/* ── Question card ── */
.question-card {
  background: var(--bg);
  border: 1.5px solid var(--line);
  border-radius: 24px;
  padding: 24px 28px 20px;
  margin-bottom: 12px;
  animation: fadeSlide .35s ease;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.q-num {
  font-family: var(--fm); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink-3); margin-bottom: 12px;
}
.q-text {
  font-family: var(--fd); font-weight: 600;
  font-size: clamp(16px, 2.5vw, 20px);
  line-height: 1.35; letter-spacing: -0.01em;
  margin-bottom: 24px;
}

/* ── Options ── */
.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 11px 16px; border-radius: 12px;
  border: 1.5px solid var(--line);
  background: var(--bg);
  cursor: pointer;
  transition: border-color .15s, background .15s, transform .1s;
  user-select: none;
  font-size: 14px; line-height: 1.5; color: var(--ink);
  text-align: left; font-family: var(--fb);
  width: 100%;
}
.option:hover:not(.locked) { border-color: var(--ink); background: var(--bg-soft); }
.option:active:not(.locked) { transform: scale(.99); }

.option-letter {
  font-family: var(--fm); font-size: 12px; font-weight: 500;
  color: var(--ink-3); flex-shrink: 0; min-width: 20px; padding-top: 1px;
}

/* States */
.option.correct {
  border-color: var(--accent);
  background: #F0FDD0;
  animation: correctPop .4s cubic-bezier(.17,.67,.3,1.4);
}
.option.correct .option-letter { color: var(--acc-ink); }

@keyframes correctPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.025); }
  100% { transform: scale(1); }
}

.option.wrong {
  border-color: var(--wrong);
  background: #FFF0F0;
  animation: shake .4s ease;
}
.option.wrong .option-letter { color: var(--wrong); }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-6px); }
  40%      { transform: translateX(5px); }
  60%      { transform: translateX(-4px); }
  80%      { transform: translateX(3px); }
}

.option.dimmed { opacity: .4; }
.option.locked { cursor: default; }

/* ── Feedback bubble ── */
.feedback {
  margin-top: 16px; padding: 14px 18px;
  border-radius: 14px; font-size: 14px; line-height: 1.6;
  animation: fadeSlide .25s ease;
  display: none;
}
.feedback.show { display: block; }
.feedback.correct-fb { background: #F0FDD0; border: 1px solid #A8E040; color: var(--acc-ink); }
.feedback.wrong-fb   { background: #FFF0F0; border: 1px solid #FFB3B3; color: #8B0000; }
.feedback-icon { font-size: 18px; margin-right: 6px; }

/* ── Next button ── */
.next-btn {
  display: none; width: 100%; margin-top: 16px;
  padding: 16px; border-radius: 14px;
  background: var(--ink); color: #fff;
  border: none; cursor: pointer;
  font-family: var(--fd); font-size: 14px; font-weight: 600;
  letter-spacing: -0.01em;
  transition: background .15s, transform .08s;
}
.next-btn:hover { background: #2d2d2d; }
.next-btn:active { transform: scale(.99); }
.next-btn.show { display: block; animation: fadeSlide .2s ease; }

/* ── Result screen ── */
.result-screen { display: none; animation: fadeSlide .4s ease; }
.result-screen.show { display: block; }

.result-card {
  border-radius: 28px; overflow: hidden;
  border: 1.5px solid var(--line);
  margin-bottom: 20px;
}
.result-top {
  padding: 40px 36px 32px;
  background: var(--ink); color: #fff; text-align: center;
}
.result-emoji { font-size: 56px; margin-bottom: 16px; }
.result-badge {
  display: inline-block;
  background: var(--accent); color: var(--acc-ink);
  font-family: var(--fm); font-size: 11px; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 4px 12px; border-radius: 99px;
  margin-bottom: 14px;
}
.result-title {
  font-family: var(--fd); font-weight: 700;
  font-size: clamp(22px, 4vw, 30px);
  line-height: 1.2; letter-spacing: -0.02em;
  margin-bottom: 8px;
}
.result-score-line {
  font-family: var(--fm); font-size: 13px;
  color: rgba(255,255,255,.55); letter-spacing: 0.05em;
}
.result-score-line strong { color: var(--accent); font-size: 20px; }

.result-bottom { padding: 32px 36px; background: var(--bg-soft); }
.result-message {
  font-size: 16px; line-height: 1.75; color: var(--ink); margin-bottom: 24px;
}
.result-message p + p { margin-top: 14px; }

.result-mantra {
  background: var(--ink); color: #fff;
  border-radius: 16px; padding: 22px 24px;
  font-family: var(--fd); font-size: 15px;
  font-weight: 500; line-height: 1.5; letter-spacing: -0.01em;
  margin-bottom: 24px;
}
.result-mantra .mantra-accent { color: var(--accent); }

.restart-btn {
  width: 100%; padding: 16px;
  border-radius: 14px; border: none;
  background: var(--accent); color: var(--acc-ink);
  font-family: var(--fd); font-size: 14px; font-weight: 700;
  letter-spacing: -0.01em; cursor: pointer;
  transition: background .15s;
}
.restart-btn:hover { background: var(--accent-h); }

/* ── Score dots ── */
.score-dots {
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  margin-top: 16px;
}
.score-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,.2);
  transition: background .3s;
}
.score-dot.got { background: var(--accent); }
.score-dot.miss { background: var(--wrong); }

/* ── Floating emoji burst ── */
.burst {
  position: fixed; pointer-events: none; z-index: 998;
  font-size: 28px; animation: burst .8s ease forwards;
}
@keyframes burst {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-90px) scale(1.4); }
}

@media (max-width: 480px) {
  .shell { padding: 24px 16px 60px; }
  .question-card { padding: 22px 18px 20px; }
  .result-top { padding: 28px 20px 24px; }
  .result-bottom { padding: 24px 20px; }
}
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="shell">
  <!-- Header -->

    <div class="quiz-eyebrow">Финальный квиз · Блогер с нуля</div>

    </div>
  </div>

  <!-- Question area -->
  <div id="questionArea"></div>

  <!-- Result -->
  <div class="result-screen" id="resultScreen"></div>
</div>

  },

    opts: [

  }
];

const results = [
  {
    range: [0, 4],
    emoji: "🌱",
    badge: "Новичок с потенциалом",
    title: "Всё впереди — и это честно",
    message: `<p>Знания придут через практику, а не через тест. Главное, что ты уже здесь и уже действуешь. Каждый блогер с миллионом подписчиков когда-то не знал, что такое маркировка рекламы — и тоже когда-то сидел над первым постом три часа.</p><p>Вернись к конспектам, пройди квиз снова через неделю — и увидишь разницу. Разрыв между «не знаю» и «знаю» закрывается очень быстро, когда начинаешь делать.</p>`
  },
  {
    range: [5, 8],
    emoji: "🚀",
    badge: "Блогер в процессе",
    title: "Ты уже понимаешь логику",
    message: `<p>Ты знаешь как строить контент, работать с аудиторией и не сжечь доверие одним постом. Осталось перевести это из знания в привычку. А это только через регулярность — не через идеальные условия.</p><p>Ошибки, которые ты ещё сделаешь — это не провалы, это материал для следующих постов. Блог растёт там, где есть честность и последовательность.</p>`
  },
  {
    range: [9, 12],
    emoji: "⭐️",
    badge: "Готовый блогер",
    title: "Ты знаешь как. Теперь — делай",
    message: `<p>Знания без действия — это красивая полка с книгами. Ты прошёл(ла) курс, ты знаешь инструменты, ты понимаешь как работает аудитория, реклама и системный контент.</p><p>Твой блог ждёт тебя прямо сейчас. Не завтра, не «как только», не «когда будет настроение» — прямо сейчас.</p>`
  }
];

const mantra = `Для каждого блога найдётся <span class="mantra-accent">своя аудитория</span>. Для каждого голоса — свои слушатели. Блогинг — это не соревнование за первое место, это марафон, в котором побеждает тот, кто не остановился.<br><br>Публикуй когда страшно. Публикуй когда кажется что никто не читает. Публикуй когда не знаешь о чём. <span class="mantra-accent">Именно в этих моментах и растут настоящие блогеры.</span>`;

const correctEmojis = ["🎉","✨","🔥","💥","🌟","👏","💪","🎊"];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let current = 0;
let score = 0;
let answered = false;
let answers = []; // true/false per question

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function render() {
  const q = questions[current];
  const area = document.getElementById('questionArea');

  document.getElementById('progressLabel').textContent = `Вопрос ${current + 1} из ${questions.length}`;
  document.getElementById('progressScore').textContent = `${score} правильных`;
  document.getElementById('progressFill').style.width = `${(current / questions.length) * 100}%`;

  area.innerHTML = `
    <div class="question-card" id="qCard">
      <div class="q-num">Вопрос ${current + 1} / ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="options">
        ${q.opts.map((o, i) => `
          <button class="option" data-idx="${i}" onclick="choose(${i})">
            <span class="option-letter">${o.l}</span>
            <span>${o.t}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="next()">
      ${current < questions.length - 1 ? 'Следующий вопрос →' : 'Посмотреть результат →'}
    </button>
  `;

  answered = false;
}

function choose(idx) {
  const q = questions[current];
  const isCorrect = idx === q.correct;
  const opts = document.querySelectorAll('.option');
  const feedback = document.getElementById('feedback');
  const btn = opts[idx];

  if (btn.classList.contains('locked') || btn.classList.contains('correct') || btn.classList.contains('wrong-locked')) return;

  if (isCorrect) {
    // Lock everything, mark correct
    opts.forEach(b => b.classList.add('locked'));
    btn.classList.add('correct');
    opts.forEach((b, i) => { if (i !== idx) b.classList.add('dimmed'); });

    if (!answered) {
      score++;
      answers.push(true);
    } else {
      // already pushed false earlier — keep that
    }
    answered = true;

    feedback.className = 'feedback show correct-fb';
    feedback.innerHTML = `<span class="feedback-icon">✅</span> ${q.fb[idx]}`;
    spawnBurst(btn);
    launchConfetti();
    document.getElementById('progressScore').textContent = `${score} правильных`;
    document.getElementById('nextBtn').classList.add('show');
  } else {
    // Wrong — show feedback, lock just this button, let them retry
    if (!answered) {
      answers.push(false);
      answered = 'wrong'; // mark that first attempt was wrong (no score)
    }
    btn.classList.add('wrong');
    // brief shake then lock this option
    setTimeout(() => {
      btn.classList.add('wrong-locked');
      btn.classList.remove('wrong');
      btn.style.opacity = '0.35';
      btn.classList.add('locked');
    }, 500);

    feedback.className = 'feedback show wrong-fb';
    feedback.innerHTML = `<span class="feedback-icon">🤔</span> ${q.fb[idx]} <em style="display:block;margin-top:6px;opacity:.7;font-size:12px;">Попробуй другой вариант →</em>`;
  }
}

function next() {
  current++;
  answered = false;
  if (current >= questions.length) {
    showResult();
  } else {
    render();
  }
}

function submitResult(tier) {
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxe7zaGT9GwyRI7TEMDSNbIH6MBKoGJwzfbd0EoFhiK6dON0QeuzXRyXAegYb2GNOYp/exec';
  const answerStr = answers.map(a => a ? '✅' : '❌').join(' ');
  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      score: score,
      total: questions.length,
      tier: tier.badge,
      answers: answerStr
    })
  }).catch(() => {});
}

function showResult() {
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('questionArea').style.display = 'none';

  const rs = document.getElementById('resultScreen');
  rs.classList.add('show');

  const tier = results.find(r => score >= r.range[0] && score <= r.range[1]);
  submitResult(tier);

  const dots = answers.map(a =>
    `<div class="score-dot ${a ? 'got' : 'miss'}"></div>`
  ).join('');

  rs.innerHTML = `
    <div class="result-card">
      <div class="result-top">
        <div class="result-emoji">${tier.emoji}</div>
        <div class="result-badge">${tier.badge}</div>
        <div class="result-title">${tier.title}</div>
        <div class="result-score-line">
          Правильных ответов: <strong>${score}</strong> из ${questions.length}
        </div>
        <div class="score-dots">${dots}</div>
      </div>
      <div class="result-bottom">
        <div class="result-message">${tier.message}</div>
        <div class="result-mantra">${mantra}</div>
        <button class="restart-btn" onclick="restart()">Пройти ещё раз →</button>
      </div>
    </div>
  `;

  if (score >= 9) launchConfetti(true);
}

function restart() {
  current = 0; score = 0; answered = false; answers = [];
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('questionArea').style.display = 'block';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('resultScreen').innerHTML = '';
  render();
}

// ══════════════════════════════════════════
//  ANIMATIONS
// ══════════════════════════════════════════
function spawnBurst(el) {
  const rect = el.getBoundingClientRect();
  const emoji = correctEmojis[Math.floor(Math.random() * correctEmojis.length)];
  const span = document.createElement('span');
  span.className = 'burst';
  span.textContent = emoji;
  span.style.left = (rect.left + rect.width / 2 - 14) + 'px';
  span.style.top  = (rect.top + window.scrollY - 10) + 'px';
  document.body.appendChild(span);
  setTimeout(() => span.remove(), 900);
}

// Confetti
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animId = null;

function launchConfetti(big = false) {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const count = big ? 120 : 45;
  const colors = ['#C4F542','#1A1A1A','#ffffff','#B8E83D','#FFD700','#FF6B6B'];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 60,
      r: 4 + Math.random() * 6,
      d: Math.random() * count,
      color: colors[Math.floor(Math.random() * colors.length)],
      tilt: Math.random() * 10 - 5,
      tiltAngle: 0,
      tiltSpeed: 0.1 + Math.random() * 0.1,
      vx: Math.random() * 3 - 1.5,
      vy: 2 + Math.random() * 3
    });
  }
  if (!animId) animateConfetti();
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.ellipse(p.x, p.y, p.r, p.r * 0.4, p.tiltAngle, 0, Math.PI * 2);
    ctx.fill();
    p.x += p.vx;
    p.y += p.vy;
    p.tiltAngle += p.tiltSpeed;
    p.vy += 0.05;
  });
  particles = particles.filter(p => p.y < canvas.height + 20);
  if (particles.length > 0) {
    animId = requestAnimationFrame(animateConfetti);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    animId = null;
  }
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
render();
</script>
